<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 pb-20 md:pb-0">

    <div class="flex min-h-screen flex-col md:flex-row">

        <!-- ========================================== -->
        <!-- SIDEBAR (Apenas visível no Computador)     -->
        <!-- ========================================== -->
        <aside class="hidden md:flex md:w-64 bg-white shadow-lg md:flex-col md:justify-between">
            <div>
                <div class="p-6 border-b">
                    <h1 class="text-2xl font-bold text-blue-600">
                        Corretora
                    </h1>
                </div>

                <nav class="p-4 space-y-2">
                    <a href="{% url 'dashboard' %}" class="block px-4 py-3 rounded-xl hover:bg-blue-50 text-gray-700 font-medium transition">
                        Dashboard
                    </a>
                    <a href="#" class="block px-4 py-3 rounded-xl hover:bg-blue-50 text-gray-700 font-medium transition">
                        Clientes
                    </a>
                    <a href="#" class="block px-4 py-3 rounded-xl hover:bg-blue-50 text-gray-700 font-medium transition">
                        Apólices
                    </a>
                    <a href="#" class="block px-4 py-3 rounded-xl hover:bg-blue-50 text-gray-700 font-medium transition">
                        Financeiro
                    </a>
                </nav>
            </div>

            <!-- Botão de Logoff no PC -->
            <div class="p-4 border-t border-gray-100">
                <form action="{% url 'logout' %}" method="post" class="w-full">
                    {% csrf_token %}
                    <button type="submit" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 font-medium hover:bg-red-50 transition text-left">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
                        </svg>
                        Sair do Sistema
                    </button>
                </form>
            </div>
        </aside>

        <!-- ========================================== -->
        <!-- MENU DO RODAPÉ (Apenas visível no Celular) -->
        <!-- ========================================== -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-2xl grid grid-cols-5 items-center h-16 z-50 text-center">
            
            <!-- 1. Dashboard -->
            <a href="{% url 'dashboard' %}" class="flex flex-col items-center justify-center py-2 text-blue-600">
                <span class="text-xl">📊</span>
                <span class="text-[9px] font-bold mt-0.5 tracking-tight">Dash</span>
            </a>

            <!-- 2. Clientes -->
            <a href="#" class="flex flex-col items-center justify-center py-2 text-gray-500 hover:text-blue-600">
                <span class="text-xl">👥</span>
                <span class="text-[9px] font-medium mt-0.5 tracking-tight">Clientes</span>
            </a>

            <!-- 3. Apólices -->
            <a href="#" class="flex flex-col items-center justify-center py-2 text-gray-500 hover:text-blue-600">
                <span class="text-xl">📄</span>
                <span class="text-[9px] font-medium mt-0.5 tracking-tight">Apólices</span>
            </a>

            <!-- 4. Financeiro -->
            <a href="#" class="flex flex-col items-center justify-center py-2 text-gray-500 hover:text-blue-600">
                <span class="text-xl">💰</span>
                <span class="text-[9px] font-medium mt-0.5 tracking-tight">Finanças</span>
            </a>

            <!-- 5. Sair -->
            <form action="{% url 'logout' %}" method="post" class="h-full w-full flex items-center justify-center">
                {% csrf_token %}
                <button type="submit" class="flex flex-col items-center justify-center h-full w-full text-red-500 hover:bg-red-50 transition-colors">
                    <span class="text-xl">🚪</span>
                    <span class="text-[9px] font-medium mt-0.5 tracking-tight">Sair</span>
                </button>
            </form>
            
        </nav>

        <!-- ========================================== -->
        <!-- CONTEÚDO PRINCIPAL                         -->
        <!-- ========================================== -->
        <main class="flex-1 p-4 md:p-10">
            {% block content %}
            <!-- O conteúdo do dashboard vai entrar aqui -->
            {% endblock %}
        </main>

    </div>

</body>
</html>
