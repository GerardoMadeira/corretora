{% extends "public_base.html" %}

{% block title %}
    Sistema Corretora
{% endblock %}

{% block content %}

<section class="max-w-7xl mx-auto px-6 py-20">

    <div class="text-center">

        <h2 class="text-5xl font-bold text-gray-800 mb-6">
            Sistema para Corretores de Seguros
        </h2>

        <p class="text-xl text-gray-600 mb-10">
            Gerencie clientes, apólices, seguradoras e financeiro
            em um único lugar.
        </p>

        <a
            href="{% url 'login' %}"
            class="w-full bg-blue-600 text-white px-8 py-4 bg-blue-600
                    hover:bg-blue-700
                    active:bg-blue-100
                    focus:ring-blue-500
                    text-white
                    font-semibold
                    py-3
                    rounded-xl
                    shadow-lg
                    hover:shadow-xl
                    transition
                    duration-150
                    transform
                    active:scale-90"
        >
            Entrar no sistema
        </a>

    </div>

</section>

{% endblock %}
