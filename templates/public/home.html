{% extends "public_base.html" %}

{% block content %}

<div class="
    min-h-screen
    flex
    items-center
    justify-center
    px-6
    bg-gradient-to-br
    from-slate-100
    via-blue-50
    to-slate-200
">

    <div class="
        max-w-4xl
        text-center
    ">

        <div class="
            inline-block
            px-4
            py-2
            rounded-full
            bg-blue-100
            text-blue-700
            text-sm
            font-semibold
            mb-6
        ">
            Plataforma para Corretores de Seguros
        </div>

        <h1 class="
            text-5xl
            md:text-7xl
            font-extrabold
            text-gray-900
            leading-tight
        ">
            Gerencie sua corretora
            com mais controle
            e organização
        </h1>

        <p class="
            mt-8
            text-xl
            text-gray-600
            max-w-2xl
            mx-auto
        ">
            Clientes, apólices, financeiro e seguradoras
            organizados em um único sistema moderno.
        </p>

        <div class="mt-10">

            <a href="{% url 'login' %}" class="
                inline-flex
                items-center
                justify-center
                px-8
                py-4
                bg-blue-600
                hover:bg-blue-700
                active:scale-95
                text-white
                text-lg
                font-semibold
                rounded-2xl
                shadow-xl
                hover:shadow-2xl
                transition
                duration-200
            ">
                Entrar no sistema
            </a>

        </div>

    </div>

</div>

{% endblock %}
