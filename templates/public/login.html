{% extends "public_base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center px-6">

    <div class="
            w-full
            max-w-md
            bg-white
            rounded-2xl
            shadow-xl
            p-10
        ">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">
                Entrar no Sistema
            </h1>

            <p class="text-gray-500 mt-2">
                Acesse sua conta de corretor
            </p>
        </div>

        {% if form.errors %}

        <div class="
            bg-red-100
            border
            border-red-300
            text-red-700
            px-4
            py-3
            rounded-xl
            mb-6
        ">
            Usuário ou senha inválidos.
        </div>

        {% endif %}

        <form method="post" class="space-y-6">

            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    E-mail
                </label>

                <input type="email" name="username" class="
                        w-full
                        px-4
                        py-3
                        border
                        border-gray-300
                        rounded-xl
                        focus:outline-none
                        focus:ring-2
                        focus:ring-blue-500
                        placeholder:text-gray-400
                        "
                    placeholder="seuemail@exemplo.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Senha
                </label>

                <input type="password" name="password" class="
                        w-full
                        px-4
                        py-3
                        border
                        border-gray-300
                        rounded-xl
                        focus:outline-none
                        focus:ring-2
                        focus:ring-blue-500
                        placeholder:text-gray-400
                    "
                    placeholder="Digite sua senha"
                    >
            </div>

            <button type="submit" class="
                    w-full
                    bg-blue-600
                    hover:bg-blue-700
                    active:bg-blue-100
                    focus:ring-blue-500
                    text-white
                    font-semibold
                    py-3
                    rounded-xl
                    shadow-lg
                    hover:shadow-xl
                    transition
                    duration-150
                    transform
                    active:scale-90
                ">
                Entrar
            </button>

        </form>

    </div>

</div>

{% endblock %}
